servers:
  web:
    hosts:
      - 138.197.0.49

  scheduler:
    hosts:
      - 138.197.0.49

  queue:
    hosts:
      - 138.197.0.49

accessories:
  database:
    hosts:
      - 138.197.0.49

# sslip.io auto-resolves <ip>.sslip.io -> <ip>, no registrar/DNS setup needed.
# Free, real, publicly resolvable — Let's Encrypt can issue a cert for it.
# Swap for a real domain later by just changing this one value.
proxy:
  hosts:
    - 138.197.0.49.sslip.io
  # Defaults to false (gnosis explicitly disables it too — DO's own load
  # balancer terminates TLS in front of kamal-proxy there). We have no such
  # LB in front, so kamal-proxy itself needs to do it via Let's Encrypt.
  ssl: true
  # When ssl:true, kamal-proxy defaults forward_headers to false — the
  # opposite of what we need. Without X-Forwarded-Proto reaching Laravel,
  # TRUSTED_PROXIES can't tell the request came in over HTTPS.
  forward_headers: true

env:
  clear:
    APP_URL: "https://138.197.0.49.sslip.io"
